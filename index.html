<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smile Notes</title>

<link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css"/>

<style>
body{margin:0;font-family:Arial;}
.app{display:flex;height:100vh;}
.sidebar{width:260px;background:#f5f5f5;display:flex;flex-direction:column;}
.editor{flex:1;display:flex;flex-direction:column;}
#vditor{flex:1;}
.note-item{padding:10px;cursor:pointer;border-bottom:1px solid #ddd;}
.note-item.active{background:#1677ff;color:#fff;}

.export-menu{
position:absolute;
background:#fff;
border:1px solid #ddd;
display:none;
z-index:1000;
}
.export-menu div{
padding:8px 12px;
cursor:pointer;
}
.export-menu div:hover{background:#eee;}
</style>
</head>

<body>

<div class="app">

<div class="sidebar">
  <button onclick="createNote()">+ 新建</button>
  <button onclick="syncGitHub()">☁ 同步</button>
  <button id="exportBtn">⬇ 导出</button>

  <div id="list"></div>
</div>

<div class="editor">
  <input id="title" placeholder="标题" style="padding:10px;font-size:18px;">
  <div id="vditor"></div>
</div>

</div>

<div id="exportMenu" class="export-menu">
  <div data-type="json">导出JSON</div>
</div>

<script src="./config.js"></script>
<script src="https://unpkg.com/vditor/dist/index.min.js"></script>

<script>

if(typeof STORAGE_KEY === "undefined"){
  alert("❌ config.js 未加载成功！");
}

// ================= 初始化 =================
let notes = [];
let currentId = null;
let editor = null;

// ================= 工具 =================
function saveLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

function renderList(){
  const el = document.getElementById("list");
  el.innerHTML = notes.map(n =>
    `<div class="note-item ${n.id===currentId?'active':''}" onclick="openNote(${n.id})">
      ${n.title || "无标题"}
    </div>`
  ).join("");
}

// ================= 笔记 =================
function createNote(){
  currentId = null;
  document.getElementById("title").value = "";
  editor.setValue("");
  renderList();
}

function openNote(id){
  const n = notes.find(x=>x.id===id);
  if(!n) return;
  currentId = id;
  document.getElementById("title").value = n.title;
  editor.setValue(n.content);
  renderList();
}

function saveNote(){
  const title = document.getElementById("title").value;
  const content = editor.getValue();

  if(currentId){
    const n = notes.find(x=>x.id===currentId);
    if(n){
      n.title = title;
      n.content = content;
    }
  }else{
    const n = {
      id: Date.now(),
      title,
      content,
      time: new Date().toLocaleString()
    };
    notes.unshift(n);
    currentId = n.id;
  }

  saveLocal();
  renderList();
}

// ================= 导出 =================
function exportJSON(){
  const blob = new Blob(
    [JSON.stringify(notes, null, 2)],
    {type:"application/json"}
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "smile_notes.json";
  a.click();
  URL.revokeObjectURL(url);
}

// ================= GitHub 拉取 =================
async function fetchGitHub(){

  if(typeof GITHUB_CONFIG === "undefined") return;

  try{
    const api = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;

    const res = await fetch(api, {
      headers:{
        Authorization:`token ${GITHUB_CONFIG.token}`
      }
    });

    if(!res.ok) return;

    const data = await res.json();

    const decoded = decodeURIComponent(escape(atob(data.content)));
    const remote = JSON.parse(decoded);

    if(Array.isArray(remote)){
      notes = remote;
      saveLocal();
    }

  }catch(e){
    console.error("拉取失败", e);
  }
}

// ================= GitHub 同步（Actions） =================
async function syncGitHub(){

  const payload = JSON.stringify(notes);

  const res = await fetch(
    "https://api.github.com/repos/smileinit111-creator/smile.github.io/dispatches",
    {
      method:"POST",
      headers:{
        "Accept":"application/vnd.github+json",
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        event_type: "update-notes",
        client_payload: {
          notes: payload
        }
      })
    }
  );

  if(res.ok){
    alert("同步成功（GitHub Actions）");
  }else{
    alert("同步失败");
  }
}

// ================= 加载 notes.json =================
async function loadNotes(){

  try{
    const res = await fetch("./notes.json?t=" + Date.now());
    if(!res.ok) return;

    const data = await res.json();

    if(Array.isArray(data)){
      notes = data;
      saveLocal();
    }
  }catch(e){
    console.error("加载失败", e);
  }
}

// ================= 初始化 =================
window.onload = async ()=>{

  // 1️⃣ 先本地/远程加载
  await loadNotes();
  await fetchGitHub();

  // 2️⃣ 初始化编辑器
  editor = new Vditor("vditor",{
    height:"100%",
    mode:"ir",
    input:saveNote
  });

  // 3️⃣ 渲染
  renderList();
};

</script>

</body>
</html>
