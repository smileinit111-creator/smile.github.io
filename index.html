<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smile_Notes</title>

<link rel="stylesheet"
href="https://unpkg.com/vditor/dist/index.css"/>

<style>
:root{
--bg:#ffffff;
--sidebar:#f7f8fa;
--card:#ffffff;
--border:#e5e7eb;
--text:#222;
--sub:#666;
--primary:#1677ff;
--hover:#eef4ff;
}

body.dark{
--bg:#1e1e1e;
--sidebar:#252526;
--card:#2d2d2d;
--border:#3a3a3a;
--text:#f5f5f5;
--sub:#b0b0b0;
--hover:#30344a;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:
"PingFang SC",
"Microsoft YaHei",
sans-serif;
}

html,body{
height:100%;
background:var(--bg);
color:var(--text);
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:280px;
background:var(--sidebar);
border-right:1px solid var(--border);
display:flex;
flex-direction:column;
transition:.3s;
}

.sidebar-header{
padding:15px;
border-bottom:1px solid var(--border);
}

.logo{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

.search{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid var(--border);
background:var(--card);
color:var(--text);
outline:none;
}

.actions{
padding:12px;
display:flex;
gap:8px;
}

.btn{
flex:1;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.primary{
background:var(--primary);
color:white;
}

.secondary{
background:var(--card);
color:var(--text);
border:1px solid var(--border);
}

.note-list{
flex:1;
overflow:auto;
padding:10px;
}

.note-item{
padding:12px;
border-radius:10px;
cursor:pointer;
margin-bottom:8px;
transition:.2s;
}

.note-item:hover{
background:var(--hover);
}

.note-item.active{
background:var(--primary);
color:white;
}

.note-title{
font-size:14px;
font-weight:600;
margin-bottom:5px;
}

.note-time{
font-size:12px;
opacity:.75;
}

.empty{
text-align:center;
padding:40px;
color:var(--sub);
}

.editor{
flex:1;
display:flex;
flex-direction:column;
background:var(--bg);
}

.editor-header{
display:flex;
align-items:center;
gap:10px;
padding:12px 16px;
border-bottom:1px solid var(--border);
}

#title{
flex:1;
border:none;
outline:none;
font-size:22px;
font-weight:600;
background:transparent;
color:var(--text);
}

.toolbar-btn{
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
background:var(--card);
color:var(--text);
border:1px solid var(--border);
}

#vditor {
    flex: 1;
    width: 100%;
    height: 100%;
}

.vditor-content {
    width: 100% !important;
}

.vditor-ir {
    max-width: none !important;
    width: 100% !important;
}

.vditor-ir__inner {
    max-width: none !important;
    width: 100% !important;
    padding-left: 40px !important;
    padding-right: 40px !important;
}

.vditor-preview {
    max-width: none !important;
    width: 100% !important;
}

.vditor-reset {
    max-width: none !important;
    width: 100% !important;
}

.status{
height:36px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
font-size:13px;
color:var(--sub);
border-top:1px solid var(--border);
}

.focus .sidebar{
display:none;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#aaa;
border-radius:10px;
}

@media(max-width:768px){
.sidebar{
width:220px;
}
}
</style>
</head>
<body>

<div class="app">

<div class="sidebar">

<div class="sidebar-header">
<div class="logo"> smile_notes</div>

<input
id="search"
class="search"
placeholder="搜索笔记...">
</div>

<div class="actions">
<button
class="btn primary"
id="create">
新建
</button>

<button
class="btn secondary"
id="themeBtn">
🌙
</button>
</div>

<div
class="note-list"
id="list">
</div>

</div>

<div class="editor">

<div class="editor-header">

<input
id="title"
placeholder="无标题笔记">

<button
class="toolbar-btn"
id="deleteBtn">
删除
</button>

</div>

<div id="vditor"></div>

<div class="status">
<div id="wordCount">
字数: 0
</div>

<div id="noteCount">
0 篇笔记
</div>
</div>

</div>

</div>

<script src="https://unpkg.com/vditor/dist/index.min.js"></script>

<script>

const STORAGE_KEY="typora_notes";

let notes=
JSON.parse(
localStorage.getItem(STORAGE_KEY)
)||[];

let currentId=null;
let editor=null;
let saveTimer=null;

const titleInput=
document.getElementById("title");

function saveStorage(){
localStorage.setItem(
STORAGE_KEY,
JSON.stringify(notes)
);
}

function formatTime(){
return new Date()
.toLocaleString();
}

function sortNotes(){
notes.sort(
(a,b)=>
new Date(b.time)
-
new Date(a.time)
);
}

function updateWordCount(){

if(!editor)return;

const count=
editor.getValue()
.replace(/\s/g,'')
.length;

document.getElementById(
"wordCount"
).innerText=
`字数: ${count}`;
}

function updateNoteCount(){

document.getElementById(
"noteCount"
).innerText=
`${notes.length} 篇笔记`;
}

function renderList(keyword=""){

sortNotes();

const list=
document.getElementById("list");

const filtered=
notes.filter(n=>{

const key=
keyword.toLowerCase();

return(
n.title.toLowerCase()
.includes(key)
||
n.content.toLowerCase()
.includes(key)
);

});

if(filtered.length===0){

list.innerHTML=
'<div class="empty">暂无笔记</div>';

updateNoteCount();
return;
}

list.innerHTML=
filtered.map(n=>`
<div
class="note-item
${currentId===n.id?'active':''}"
data-id="${n.id}">

<div class="note-title">
${n.title||"无标题"}
</div>

<div class="note-time">
${n.time}
</div>

</div>
`).join("");

updateNoteCount();
}

function openNote(id){

const note=
notes.find(
n=>n.id===id
);

if(!note)return;

currentId=id;

titleInput.value=
note.title;

editor.setValue(
note.content
);

updateWordCount();

renderList(
document
.getElementById("search")
.value
);
}

function saveNote(){

const title=
titleInput.value.trim();

const content=
editor.getValue();

if(!title && !content)
return;

const time=
formatTime();

if(currentId){

const i=
notes.findIndex(
n=>n.id===currentId
);

notes[i]={
...notes[i],
title,
content,
time
};

}else{

const note={
id:Date.now(),
title,
content,
time
};

notes.unshift(note);

currentId=note.id;
}

saveStorage();
renderList(
document.getElementById("search").value
);
}

function autoSave(){

clearTimeout(saveTimer);

saveTimer=
setTimeout(()=>{
saveNote();
},1000);
}

function createNote(){

currentId=null;

titleInput.value="";

editor.setValue("");

updateWordCount();

renderList(
document.getElementById("search").value
);
}

window.onload=()=>{

editor=
new Vditor(
"vditor",
{
height:"100%",
mode:"ir",
cache:false,
placeholder:
"开始记录你的想法...",

toolbar:[
"emoji",
"headings",
"bold",
"italic",
"strike",
"|",
"list",
"ordered-list",
"check",
"|",
"quote",
"line",
"code",
"table",
"link",
"|",
"undo",
"redo"
],

input(){

updateWordCount();

autoSave();

}
}
);

renderList();

titleInput.addEventListener(
"input",
autoSave
);

document
.getElementById("create")
.onclick=
createNote;

document
.getElementById("deleteBtn")
.onclick=()=>{

if(!currentId){
alert("请选择笔记");
return;
}

if(!confirm("确定删除？"))
return;

notes=
notes.filter(
n=>n.id!==currentId
);

saveStorage();

createNote();

};

document
.getElementById("list")
.onclick=e=>{

const item=
e.target.closest(
".note-item"
);

if(!item)return;

openNote(
Number(
item.dataset.id
)
);

};

document
.getElementById("search")
.addEventListener(
"input",
e=>{
renderList(
e.target.value
);
}
);

document
.getElementById("themeBtn")
.onclick=()=>{

document.body
.classList
.toggle("dark");

};

document
.addEventListener(
"keydown",
e=>{

if(
e.ctrlKey
&&
e.key==="s"
){

e.preventDefault();

saveNote();
}

if(
e.ctrlKey
&&
e.key==="n"
){

e.preventDefault();

createNote();
}

if(
e.key==="F11"
){

e.preventDefault();

document.body
.classList
.toggle("focus");
}
}
);

setTimeout(()=>{
updateWordCount();
},500);

};

</script>

</body>
</html>
