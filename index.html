<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的笔记 - Markdown</title>
<link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,"Microsoft YaHei",sans-serif}
body{background:#fff;display:flex;height:100vh;color:#333}
.sidebar{width:260px;background:#f7f8fa;border-right:1px solid #e5e7eb;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px;border-bottom:1px solid #e5e7eb}
.sidebar-header h2{font-size:17px;font-weight:600;color:#111}
.add-btn{width:100%;padding:10px 12px;background:#0070f3;color:white;border:none;border-radius:8px;margin-top:10px;cursor:pointer;font-size:14px}
.add-btn:hover{background:#005fc8}
.note-list{flex:1;overflow-y:auto;padding:8px}
.note-item{padding:12px;border-radius:8px;margin-bottom:6px;cursor:pointer}
.note-item:hover{background:#eef2ff}
.note-item.active{background:#0070f3;color:white}
.note-title{font-weight:500;margin-bottom:4px;font-size:14px}
.note-time{font-size:12px;opacity:0.7}
.empty{text-align:center;padding:40px 10px;font-size:14px;color:#999}
.editor{flex:1;display:flex;flex-direction:column}
.editor-header{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #e5e7eb;gap:10px}
#title{flex:1;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;outline:none;font-size:14px}
.btn{padding:8px 14px;border:none;border-radius:8px;cursor:pointer;font-size:14px}
.save{background:#0070f3;color:white}
.delete{background:#f43f5e;color:white}
#vditor{flex:1}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>我的笔记</h2>
    <button class="add-btn" id="create">+ 新建笔记</button>
  </div>
  <div class="note-list" id="list"></div>
</div>

<div class="editor">
  <div class="editor-header">
    <input id="title" placeholder="笔记标题">
    <button class="btn save" id="save">保存</button>
    <button class="btn delete" id="del">删除</button>
  </div>
  <div id="vditor"></div>
</div>

<script src="https://unpkg.com/vditor/dist/index.min.js"></script>
<script>
// ====================== 前端模拟后端存储（LocalStorage）======================
const STORAGE_KEY = "notes_db";
let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let currentId = null;
let editor;

// 初始化编辑器
window.onload = function () {
  editor = new Vditor("vditor", {
    height: "100%",
    mode: "ir",
    cache: false,
    placeholder: "开始记录笔记...",
    toolbar: ["headings", "bold", "italic", "strike", "|", "list", "ordered-list", "check", "|", "code", "quote", "table", "link"]
  });

  renderList();
  bindEvents();
};

// 渲染笔记列表
function renderList() {
  const el = document.getElementById("list");
  el.innerHTML = notes.length === 0
    ? '<div class="empty">暂无笔记</div>'
    : notes.map(n => `
      <div class="note-item ${currentId === n.id ? 'active' : ''}" data-id="${n.id}">
        <div class="note-title">${n.title || "无标题"}</div>
        <div class="note-time">${n.time}</div>
      </div>
    `).join("");
}

// 绑定所有按钮事件
function bindEvents() {
  // 新建笔记
  document.getElementById("create").onclick = () => {
    currentId = null;
    document.getElementById("title").value = "";
    editor.setValue("");
    renderList();
  };

  // 保存笔记（模拟后端写入）
  document.getElementById("save").onclick = () => {
    const title = document.getElementById("title").value.trim();
    const content = editor.getValue().trim();
    const time = new Date().toLocaleString();
    if (!title && !content) return alert("笔记不能为空");

    if (currentId) {
      // 更新
      const i = notes.findIndex(x => x.id === currentId);
      notes[i] = { ...notes[i], title, content, time };
    } else {
      // 新增
      const note = { id: Date.now(), title, content, time };
      notes.unshift(note);
      currentId = note.id;
    }

    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    renderList();
    alert("保存成功");
  };

  // 删除笔记
  document.getElementById("del").onclick = () => {
    if (!currentId) return alert("请选择笔记");
    if (!confirm("确定删除？")) return;
    notes = notes.filter(x => x.id !== currentId);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    currentId = null;
    document.getElementById("title").value = "";
    editor.setValue("");
    renderList();
  };

  // 点击列表打开
  document.getElementById("list").onclick = e => {
    const item = e.target.closest(".note-item");
    if (!item) return;
    currentId = +item.dataset.id;
    const note = notes.find(x => x.id === currentId);
    document.getElementById("title").value = note.title;
    editor.setValue(note.content);
    renderList();
  };
}
</script>
</body>
</html>
