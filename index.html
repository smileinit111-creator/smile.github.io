<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smile Notes</title>

<link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css"/>

<style>
body{margin:0;font-family:Arial;}
.app{display:flex;height:100vh;}
.sidebar{width:260px;background:#f5f5f5;display:flex;flex-direction:column;}
.editor{flex:1;display:flex;flex-direction:column;}
#vditor{flex:1;}
.note-item{padding:10px;cursor:pointer;border-bottom:1px solid #ddd;}
.note-item.active{background:#1677ff;color:#fff;}
.toolbar{display:flex;gap:6px;padding:8px;}
button{cursor:pointer;}

.export-menu{
position:absolute;
background:#fff;
border:1px solid #ddd;
display:none;
z-index:1000;
}
.export-menu div{
padding:8px 12px;
cursor:pointer;
}
.export-menu div:hover{
background:#eee;
}
</style>
</head>

<body>

<div class="app">

<!-- 左侧 -->
<div class="sidebar">
  <button onclick="createNote()">+ 新建</button>
  <button onclick="syncGitHub()">☁ 同步</button>
  <button id="exportBtn">⬇ 导出</button>

  <div id="list"></div>
</div>

<!-- 编辑区 -->
<div class="editor">
  <input id="title" placeholder="标题" style="padding:10px;font-size:18px;">
  <div id="vditor"></div>
</div>

</div>

<!-- 导出菜单 -->
<div id="exportMenu" class="export-menu">
  <div data-type="json">导出JSON</div>
</div>

<script src="https://unpkg.com/vditor/dist/index.min.js"></script>
<script src="./config.js"></script>

<script>

let notes = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
let currentId = null;
let editor;

// ================= 工具 =================
function saveLocal(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
}

function renderList(){
  const el = document.getElementById("list");
  el.innerHTML = notes.map(n =>
    `<div class="note-item ${n.id===currentId?'active':''}" onclick="openNote(${n.id})">
      ${n.title || "无标题"}
    </div>`
  ).join("");
}

// ================= 笔记 =================
function createNote(){
  currentId = null;
  document.getElementById("title").value = "";
  editor.setValue("");
  renderList();
}

function openNote(id){
  const n = notes.find(x=>x.id===id);
  if(!n) return;
  currentId = id;
  document.getElementById("title").value = n.title;
  editor.setValue(n.content);
  renderList();
}

function saveNote(){
  const title = document.getElementById("title").value;
  const content = editor.getValue();

  if(currentId){
    const n = notes.find(x=>x.id===currentId);
    n.title = title;
    n.content = content;
  }else{
    const n = {
      id: Date.now(),
      title,
      content,
      time: new Date().toLocaleString()
    };
    notes.unshift(n);
    currentId = n.id;
  }

  saveLocal();
  renderList();
}

// ================= 导出（修复版） =================
function exportJSON(){
  const blob = new Blob(
    [JSON.stringify(notes, null, 2)],
    {type:"application/json"}
  );

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "smile_notes.json";
  a.click();
  URL.revokeObjectURL(url);
}

// ================= GitHub同步（完整修复） =================
async function syncGitHub(){

  if(GITHUB_CONFIG.token.includes("你的真实token")){
    alert("请先配置 GitHub token");
    return;
  }

  const api = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}`;

  const content = btoa(unescape(encodeURIComponent(JSON.stringify(notes))));

  let sha = "";

  // 先查是否存在文件
  const getRes = await fetch(api, {
    headers:{
      Authorization:`token ${GITHUB_CONFIG.token}`
    }
  });

  if(getRes.ok){
    const data = await getRes.json();
    sha = data.sha;
  }

  const res = await fetch(api, {
    method:"PUT",
    headers:{
      "Authorization":`token ${GITHUB_CONFIG.token}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"update notes",
      content,
      branch:GITHUB_CONFIG.branch,
      sha
    })
  });

  if(res.ok){
    alert("同步成功");
  }else{
    alert("同步失败，请检查token权限");
  }
}

// ================= 初始化 =================
window.onload = ()=>{

  editor = new Vditor("vditor",{
    height:"100%",
    mode:"ir",
    input:saveNote
  });

  renderList();

  document.getElementById("title").oninput = saveNote;

  // 导出按钮
  const btn = document.getElementById("exportBtn");
  const menu = document.getElementById("exportMenu");

  btn.onclick = (e)=>{
    menu.style.display = "block";
    menu.style.left = e.pageX + "px";
    menu.style.top = e.pageY + "px";
  };

  menu.onclick = (e)=>{
    if(e.target.dataset.type==="json"){
      exportJSON();
    }
    menu.style.display="none";
  };

  document.body.onclick = ()=>menu.style.display="none";
};

</script>

</body>
</html>
