<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的笔记 | Markdown</title>
<link rel="stylesheet" href="https://unpkg.com/vditor/dist/index.css" />
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif;}
  body{background:#f5f7fa;display:flex;height:100vh;flex-direction:column;}
  header{background:#222;color:#fff;padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;}
  .logo{font-size:1.5rem;font-weight:bold;}
  nav a{color:#fff;margin-left:1.5rem;text-decoration:none;}
  nav a:hover{color:#409eff;}

  .main{display:flex;flex:1;overflow:hidden;}
  .sidebar{width:280px;background:white;border-right:1px solid #e4e7ed;padding:20px;display:flex;flex-direction:column;}
  .sidebar h2{margin-bottom:15px;color:#333;}
  .add-btn{padding:10px;background:#409eff;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;margin-bottom:20px;}
  .add-btn:hover{background:#66b1ff;}
  .note-list{flex:1;overflow-y:auto;}
  .note-item{padding:12px;border-radius:6px;margin-bottom:8px;background:#f5f7fa;cursor:pointer;transition:0.2s;}
  .note-item:hover{background:#e4e7ed;}
  .note-item.active{background:#409eff;color:white;}
  .note-item .title{font-weight:bold;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .note-item .time{font-size:12px;opacity:0.8;}
  .empty-tip{text-align:center;color:#909399;margin-top:50px;}

  .editor-wrap{flex:1;display:flex;flex-direction:column;padding:20px;}
  .top-bar{display:flex;align-items:center;margin-bottom:15px;gap:10px;}
  #noteTitle{flex:1;padding:10px 15px;font-size:20px;border:1px solid #e4e7ed;border-radius:6px;outline:none;}
  .btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
  .save-btn{background:#67c23a;color:white;}
  .del-btn{background:#f56c6c;color:white;}
  #vditor{flex:1;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
</style>
</head>
<body>
<header>
  <div class="logo">Smile_init</div>
  <nav>
    <a href="index.html">首页</a>
    <a href="notes.html">我的笔记</a>
  </nav>
</header>

<div class="main">
  <div class="sidebar">
    <h2>我的笔记</h2>
    <button class="add-btn" id="addNote">+ 新建笔记</button>
    <div class="note-list" id="noteList"></div>
  </div>

  <div class="editor-wrap">
    <div class="top-bar">
      <input type="text" id="noteTitle" placeholder="笔记标题">
      <button class="btn save-btn" id="saveNote">保存</button>
      <button class="btn del-btn" id="deleteNote">删除</button>
    </div>
    <div id="vditor"></div>
  </div>
</div>

<script src="https://unpkg.com/vditor/dist/index.min.js"></script>
<script>
let notes = JSON.parse(localStorage.getItem('mdNotes')) || [];
let currentNoteId = null;
let vditor;

window.onload = function() {
    // 初始化编辑器
    vditor = new Vditor('vditor', {
        height: '100%',
        mode: 'ir', // 最像 Typora 的即时渲染模式
        preview: { mode: 'both' },
        cache: { enable: false },
        toolbar: [
            'headings', 'bold', 'italic', 'strike', '|',
            'list', 'ordered-list', 'check', '|',
            'link', 'image', 'table', '|',
            'code', 'quote', '|', 'preview', 'mode'
        ]
    });

    // 渲染笔记列表
    renderNotes();

    // 绑定新建笔记
    document.getElementById('addNote').addEventListener('click', function() {
        currentNoteId = null;
        document.getElementById('noteTitle').value = '';
        vditor.setValue('');
        renderNotes();
        console.log('新建笔记成功！');
    });

    // 保存笔记
    document.getElementById('saveNote').addEventListener('click', function() {
        const title = document.getElementById('noteTitle').value.trim();
        const content = vditor.getValue().trim();
        const time = new Date().toLocaleString();

        if (!title && !content) {
            alert('笔记不能为空！');
            return;
        }

        if (currentNoteId) {
            const index = notes.findIndex(n => n.id === currentNoteId);
            notes[index] = { ...notes[index], title, content, time };
        } else {
            const newNote = {
                id: Date.now(),
                title: title,
                content: content,
                time: time
            };
            notes.unshift(newNote);
            currentNoteId = newNote.id;
        }

        localStorage.setItem('mdNotes', JSON.stringify(notes));
        renderNotes();
        alert('保存成功！');
    });

    // 删除笔记
    document.getElementById('deleteNote').addEventListener('click', function() {
        if (!currentNoteId) {
            alert('请先选择笔记');
            return;
        }
        if (!confirm('确定删除？')) return;

        notes = notes.filter(n => n.id !== currentNoteId);
        localStorage.setItem('mdNotes', JSON.stringify(notes));
        currentNoteId = null;
        document.getElementById('noteTitle').value = '';
        vditor.setValue('');
        renderNotes();
    });
};

function renderNotes() {
    const noteListEl = document.getElementById('noteList');
    noteListEl.innerHTML = '';

    if (notes.length === 0) {
        noteListEl.innerHTML = '<div class="empty-tip">暂无笔记</div>';
        return;
    }

    notes.forEach(note => {
        const item = document.createElement('div');
        item.className = `note-item ${currentNoteId === note.id ? 'active' : ''}`;
        item.innerHTML = `
            <div class="title">${note.title || '无标题'}</div>
            <div class="time">${note.time}</div>
        `;
        item.onclick = () => {
            currentNoteId = note.id;
            document.getElementById('noteTitle').value = note.title;
            vditor.setValue(note.content);
            renderNotes();
        };
        noteListEl.appendChild(item);
    });
}
</script>
</body>
</html>
